---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: fabric-org1
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-org1
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: couchdb-org1-peer1
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-org1-couchdb
  resources:
    requests:
      storage: 1Gi
